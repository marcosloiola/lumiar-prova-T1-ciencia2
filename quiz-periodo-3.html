    <style>

        .feedback {

        .btn {
            padding: 12px 25px;

        }

        .btn-primary {

        .progress-info {

        .progress-bar {

        .difficulty {

        }

        .results {

        }

        .results.show {

        }

        .results-header {
            background: linear-gradient(135deg, #4CAF50 0%, #81C784 100%);
            color: white;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .results-header h2 {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .score-display {
            font-size: 3.5em;
            font-weight: bold;
            margin: 20px 0;
        }

        .score-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .score-card {
            background: white;

            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .score-card.correct {

        }

        .score-card.incorrect {

        .score-card-number {

        .score-card.correct .score-card-number {

        .score-card-label {

        .percentage {

        .percentage-number {

        .message.excellent {

        }

        .message.good {

        }

        .message.fair {

        }

        .message.improve {

        }

        .footer {
            background: #f5f5f5;
            padding: 30px;
            text-align: center;
            border-top: 3px solid #667eea;
        }

        .footer-buttons {
            display: flex;
            gap: 15px;

            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.6em;
            }

            .content {

            .score-details {
                grid-template-columns: 1fr;
            }

            .results-header h2 {

<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Quiz - Efeito Estufa & Termodinâmica</h1>
            <p>Período 3 | 24 Perguntas</p>
        </div>

        <div class="content">
            <div class="progress-info">
                <div id="progressText">Pergunta 1 de 24</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 4%"></div>
                </div>
            </div>

            <div id="quizContent"></div>

            <div id="resultsContainer" class="results">
                <div class="results-header">
                    <h2>🎉 Parabéns!</h2>
                    <p>Você completou o quiz!</p>
                </div>

                <div class="percentage">
                    <div>Seu Desempenho</div>
                    <div class="percentage-number" id="percentageDisplay">0%</div>
                </div>

                <div class="score-details">
                    <div class="score-card correct">
                        <div class="score-card-label">Acertos</div>
                        <div class="score-card-number" id="correctCount">0</div>
                    </div>
                    <div class="score-card incorrect">
                        <div class="score-card-label">Erros</div>
                        <div class="score-card-number" id="incorrectCount">0</div>
                    </div>
                </div>

                <div id="messageFeedback"></div>

                <div style="margin-top: 30px;">
                    <button class="btn btn-primary" onclick="location.href='guia-periodo-3.html'">📚 Voltar ao Guia de Estudo</button>
                </div>

        <div class="footer">
            <p>Bom estudos, Murilo! 🌟</p>

    <script>
        // Dados das perguntas com respostas variadas em comprimento
        const questions = [
            // FÁCEIS (1-8)
            {
                id: 1,
                text: "O efeito estufa é um fenômeno natural ou totalmente causado pelo homem?",
                difficulty: "easy",
                options: [
                    { text: "É totalmente criado pelo homem, não é natural", correct: false, explanation: "Errado. O efeito estufa é um processo NATURAL e ESSENCIAL para a vida. Sem ele, a temperatura seria -18°C. O homem está apenas intensificando este processo natural aumentando gases de efeito estufa." },
                    { text: "É um processo natural e essencial, mas o homem o intensifica", correct: true, explanation: "Correto! O efeito estufa é NATURAL e ESSENCIAL para que haja vida na Terra. O que o homem faz é aumentar a concentração de gases de efeito estufa, intensificando o fenômeno." },
                    { text: "É inventado por cientistas para assustar as pessoas", correct: false, explanation: "Não é verdade. O efeito estufa é um fenômeno físico real estudado por cientistas há muito tempo. É comprovado cientificamente e não é uma invenção para assustar." },
                    { text: "Não existe efeito estufa, é apenas uma teoria", correct: false, explanation: "Errado. O efeito estufa é um fato científico comprovado. Podemos medir os gases na atmosfera e seus efeitos na temperatura do planeta." }
                ]
            },
            {
                id: 2,
                text: "Qual seria a temperatura média da Terra SEM o efeito estufa natural?",
                difficulty: "easy",
                options: [
                    { text: "0°C", correct: false, explanation: "Não. Sem o efeito estufa, a temperatura seria muito mais fria. A resposta correta é -18°C, tornando impossível a existência de vida como conhecemos." },
                    { text: "-18°C", correct: true, explanation: "Correto! Sem o efeito estufa natural, a temperatura média seria -18°C, o que tornaria a vida impossível. É por isso que o efeito estufa é ESSENCIAL para o planeta." },
                    { text: "25°C", correct: false, explanation: "Não. 25°C seria na verdade mais quente que a atual. Sem o efeito estufa, faria muito frio, cerca de -18°C." },
                    { text: "10°C", correct: false, explanation: "Não é correto. O valor é bem mais baixo. Sem o efeito estufa, teríamos -18°C de temperatura média." }
                ]
            },
            {
                id: 3,
                text: "Qual é a temperatura média atual da Terra COM o efeito estufa natural?",
                difficulty: "easy",
                options: [
                    { text: "20°C", correct: false, explanation: "Próximo, mas não é exato. A temperatura média é 15°C, o que permite as condições perfeitas para a vida na Terra." },
                    { text: "15°C", correct: true, explanation: "Correto! Com o efeito estufa natural, a temperatura média da Terra é 15°C. Esta é a temperatura ideal que permite a existência de vida como conhecemos." },
                    { text: "30°C", correct: false, explanation: "Não. 30°C seria muito quente. A temperatura média real é 15°C. Os 30°C que você sente em alguns dias é local, não global." },
                    { text: "-5°C", correct: false, explanation: "Não. Essa temperatura seria muito fria. Com o efeito estufa natural, a média é 15°C, permitindo vida na Terra." }
                ]
            },
            {
                id: 4,
                text: "Qual é o principal gás de efeito estufa produzido pela queima de combustíveis fósseis?",
                difficulty: "easy",
                options: [
                    { text: "Oxigênio (O₂)", correct: false, explanation: "Não. Oxigênio não é um gás de efeito estufa. O principal gás produzido pela queima de combustíveis fósseis é o dióxido de carbono (CO₂)." },
                    { text: "Dióxido de carbono (CO₂)", correct: true, explanation: "Correto! O dióxido de carbono (CO₂) é o principal gás de efeito estufa produzido pelo homem através da queima de combustíveis fósseis como carvão, petróleo e gás natural." },
                    { text: "Nitrogênio (N₂)", correct: false, explanation: "Não. Nitrogênio é o gás mais abundante da atmosfera, mas não é gás de efeito estufa. O responsável é o CO₂." },
                    { text: "Hélio (He)", correct: false, explanation: "Não. Hélio é um elemento nobre muito raro. O gás de efeito estufa principal produzido por combustíveis fósseis é o CO₂." }
                ]
            },
            {
                id: 5,
                text: "O que afirma a 1ª Lei da Termodinâmica?",
                difficulty: "easy",
                options: [
                    { text: "A energia sempre aumenta", correct: false, explanation: "Não. A 1ª Lei não diz que energia aumenta. Ela afirma que a energia não se cria nem se destrói, apenas se transforma." },
                    { text: "A energia não se cria nem se destrói, apenas se transforma", correct: true, explanation: "Correto! A 1ª Lei da Termodinâmica é exatamente isso: a energia é conservada. Ela não desaparece, apenas muda de forma." },
                    { text: "A temperatura é sempre igual em todo lugar", correct: false, explanation: "Não. A 1ª Lei fala sobre conservação de energia, não sobre igualdade de temperatura." },
                    { text: "Todos os gases se comportam da mesma forma", correct: false, explanation: "Não. A 1ª Lei da Termodinâmica diz que a energia não se cria nem se destrói, apenas se transforma." }
                ]
            },
            {
                id: 6,
                text: "Em qual estrutura celular ocorre a fotossíntese?",
                difficulty: "easy",
                options: [
                    { text: "Mitocôndria", correct: false, explanation: "Não. Mitocôndria é onde ocorre RESPIRAÇÃO celular. Fotossíntese ocorre nos CLOROPLASTOS." },
                    { text: "Núcleo", correct: false, explanation: "Não. O núcleo armazena informações genéticas, não realiza fotossíntese. Fotossíntese ocorre nos cloroplastos." },
                    { text: "Cloroplasto", correct: true, explanation: "Correto! A fotossíntese ocorre nos CLOROPLASTOS, estruturas especializadas nas células das plantas que contêm clorofila, o pigmento que absorve luz solar." },
                    { text: "Ribossomo", correct: false, explanation: "Não. Ribossomo sintetiza proteínas. A fotossíntese ocorre nos cloroplastos das células vegetais." }
                ]
            },
            {
                id: 7,
                text: "Quais organismos produzem mais de 50% do oxigênio da atmosfera?",
                difficulty: "easy",
                options: [
                    { text: "Árvores das florestas", correct: false, explanation: "As florestas são importantes, mas não produzem mais de 50% do oxigênio. Os fitoplânctons (algas microscópicas dos oceanos) produzem mais de 50%." },
                    { text: "Cactus e plantas desérticas", correct: false, explanation: "Não. Plantas desérticas produzem pouco oxigênio. Mais de 50% vem dos fitoplânctons nos oceanos." },
                    { text: "Fitoplânctons (algas microscópicas)", correct: true, explanation: "Correto! Os fitoplânctons - algas microscópicas como dinoflagelados, diatomáceas e cianobactérias - vivem nos oceanos e produzem mais de 50% do oxigênio atmosférico que respiramos!" },
                    { text: "Bactérias do solo", correct: false, explanation: "Não. Bactérias do solo não realizam fotossíntese de forma a produzir oxigênio. Quem faz isso são os fitoplânctons nos oceanos." }
                ]
            },
            {
                id: 8,
                text: "Dê exemplos de combustíveis fósseis.",
                difficulty: "easy",
                options: [
                    { text: "Madeira e papel reciclado", correct: false, explanation: "Não são combustíveis fósseis. Combustíveis fósseis são formados de organismos mortos há milhões de anos. Exemplos: carvão, petróleo e gás natural." },
                    { text: "Carvão, petróleo e gás natural", correct: true, explanation: "Correto! Os principais combustíveis fósseis são: CARVÃO (usado em usinas de energia), PETRÓLEO (combustível para carros) e GÁS NATURAL (aquecimento e eletricidade). Todos foram formados há milhões de anos." },
                    { text: "Sol e água", correct: false, explanation: "Sol e água são fontes de energia renováveis, não combustíveis fósseis. Combustíveis fósseis são carvão, petróleo e gás natural." },
                    { text: "Álcool e biodiesel", correct: false, explanation: "Estes são biocombustíveis renováveis, não combustíveis fósseis. Os combustíveis fósseis são carvão, petróleo e gás natural." }
                ]
            },

            // MÉDIAS (9-16)
            {
                id: 9,
                text: "Cite os 5 principais gases de efeito estufa.",
                difficulty: "medium",
                options: [
                    { text: "Oxigênio, nitrogênio, argônio, neon e hélio", correct: false, explanation: "Não. Esses são gases da atmosfera normal, mas não são gases de efeito estufa. Os principais são: vapor de água (H₂O), dióxido de carbono (CO₂), metano (CH₄), óxido nitroso (N₂O) e ozônio (O₃)." },
                    { text: "Vapor de água, CO₂, metano, óxido nitroso e ozônio", correct: true, explanation: "Correto! Os 5 principais gases de efeito estufa são: 1) VAPOR DE ÁGUA (H₂O) - o mais abundante, 2) DIÓXIDO DE CARBONO (CO₂) - da combustão, 3) METANO (CH₄) - da pecuária, 4) ÓXIDO NITROSO (N₂O) - de fertilizantes, e 5) OZÔNIO (O₃)." },
                    { text: "Cloro, flúor, bromo, iodo e criptônio", correct: false, explanation: "Não. Esses não são gases de efeito estufa. Os principais são: vapor de água, CO₂, metano, óxido nitroso e ozônio." },
                    { text: "Apenas dióxido de carbono", correct: false, explanation: "CO₂ é o principal produzido pelo homem, mas não é o único. Há 5 principais: vapor de água, CO₂, metano, óxido nitroso e ozônio." }
                ]
            },
            {
                id: 10,
                text: "O que é entropia e como ela se relaciona com os estados da matéria?",
                difficulty: "medium",
                options: [
                    { text: "É a energia total de uma substância", correct: false, explanation: "Não. Entropia não é energia total. Entropia é o GRAU DE DESORDEM. Sólido tem menos entropia (mais organizado), líquido tem média, e gás tem mais entropia (muito desorganizado)." },
                    { text: "É o grau de desordem: sólido tem menos, líquido tem média, gás tem mais", correct: true, explanation: "Correto! ENTROPIA mede o grau de DESORDEM de um sistema. Sólidos têm baixa entropia (bem organizados), líquidos têm entropia média, e gases têm alta entropia (muito desorganizados). Quanto mais gasoso, maior a desordem." },
                    { text: "É a temperatura de um objeto qualquer", correct: false, explanation: "Não. Entropia não é temperatura. Entropia é o GRAU DE DESORDEM. Ordem: Sólido (menos desordem) < Líquido < Gás (mais desordem)." },
                    { text: "É apenas um conceito teórico sem aplicação prática", correct: false, explanation: "Não. Entropia é um conceito físico real. Ela descreve o grau de desordem: sólidos têm pouca entropia, gases têm muita entropia." }
                ]
            },
            {
                id: 11,
                text: "Qual é a diferença entre efeito estufa natural e aquecimento global?",
                difficulty: "medium",
                options: [
                    { text: "Não há diferença, são a mesma coisa", correct: false, explanation: "Há SIM diferença! Efeito estufa natural é essencial e mantém a vida. Aquecimento global é o aumento do efeito estufa causado pelo homem ao queimar combustíveis fósseis." },
                    { text: "Efeito estufa é natural e essencial; aquecimento global é o aumento causado pelo homem intensificando o efeito natural", correct: true, explanation: "Correto! EFEITO ESTUFA NATURAL = fenômeno que mantém a Terra em 15°C. AQUECIMENTO GLOBAL = aumento da temperatura causado pelo homem aumentando gases de efeito estufa através da queima de combustíveis fósseis." },
                    { text: "Aquecimento global é natural e efeito estufa é criado pelo homem", correct: false, explanation: "Ao contrário! Efeito estufa é natural e essencial. Aquecimento global é o aumento causado pelo homem intensificando este efeito natural." },
                    { text: "Efeito estufa ocorre apenas em estufa de plantas", correct: false, explanation: "Não. O efeito estufa é um fenômeno que ocorre em toda a atmosfera terrestre. O nome vem porque funciona como uma estufa, mas ocorre em escala global." }
                ]
            },
            {
                id: 12,
                text: "Como a queimada de florestas contribui para o aquecimento global?",
                difficulty: "medium",
                options: [
                    { text: "As árvores absorvem gases de efeito estufa, então queimá-las não afeta", correct: false, explanation: "Errado! As árvores FAZEM sequestro de carbono (absorvem CO₂). Ao queimar: 1) Libera CO₂ armazenado, 2) Destrói futuras plantas que absorveriam CO₂, intensificando o aquecimento." },
                    { text: "Libera o CO₂ armazenado nas árvores e destrói plantas que fariam sequestro de carbono", correct: true, explanation: "Correto! Queimadas causam aquecimento porque: 1) LIBERAM CO₂ armazenado nas árvores, 2) DESTROEM futuras plantas que fariam sequestro de carbono (absorção de CO₂), 3) Há MENOS absorção de CO₂ e MAIS liberação, intensificando o efeito estufa." },
                    { text: "O fogo esfria a atmosfera", correct: false, explanation: "Não. O fogo libera energia e gases de efeito estufa, aquecendo a atmosfera. Além disso, árvores queimadas deixam de fazer sequestro de carbono." },
                    { text: "Florestas não têm relação com o clima", correct: false, explanation: "Muito errado! Florestas têm papel crucial. Fazem sequestro de carbono (absorvem CO₂). Queimá-las libera CO₂ e piora o aquecimento global." }
                ]
            },
            {
                id: 13,
                text: "Qual é a distribuição da energia solar que chega à Terra?",
                difficulty: "medium",
                options: [

        let currentQuestion = 0;
        let score = 0;
        let userAnswers = [];

        function initQuiz() {
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            const quizContent = document.getElementById('quizContent');

            let html = `
                <div class="quiz-container active">
                    <div class="question-number">Pergunta ${q.id} de 24 <span class="difficulty ${q.difficulty}">${getDifficultyLabel(q.difficulty)}</span></div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
            `;

            q.options.forEach((option, idx) => {
                const letter = String.fromCharCode(65 + idx);
                html += `
                    <button class="option" onclick="selectAnswer(${currentQuestion}, ${idx})" data-index="${idx}">
                        <strong>${letter})</strong> ${option.text}
                    </button>
                `;
            });

            html += `
                    </div>
                    <div class="feedback" id="feedback-${currentQuestion}"></div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Próxima Pergunta →</button>
                        <button class="btn btn-secondary" onclick="previousQuestion()">← Pergunta Anterior</button>
                    </div>
                </div>
            `;

            quizContent.innerHTML = html;
            updateProgress();
        }

        function getDifficultyLabel(diff) {
            if (diff === 'easy') return 'Fácil ✓';
            if (diff === 'medium') return 'Média ⚡';
            return 'Difícil 🔥';
        }

        function selectAnswer(qIdx, optIdx) {
            const q = questions[qIdx];
            const option = q.options[optIdx];
            const buttons = document.querySelectorAll(`.quiz-container.active .option`);

            buttons.forEach(btn => btn.disabled = true);

            const selectedBtn = buttons[optIdx];
            const feedback = document.getElementById(`feedback-${qIdx}`);

            userAnswers[qIdx] = optIdx;

            if (option.correct) {
                selectedBtn.classList.add('correct');
                feedback.innerHTML = `
                    <div class="feedback correct show">
                        <div class="feedback-title">✓ Acertou!</div>
                        <div class="feedback-content">${option.explanation}</div>
                    </div>
                `;
                score++;
            } else {
                selectedBtn.classList.add('incorrect');
                const correctIdx = q.options.findIndex(o => o.correct);
                const correctBtn = buttons[correctIdx];
                correctBtn.classList.add('correct');

                feedback.innerHTML = `
                    <div class="feedback incorrect show">
                        <div class="feedback-title">✗ Resposta incorreta</div>
                        <div class="feedback-content"><strong>Resposta correta:</strong> ${q.options[correctIdx].text}<br><br>${option.explanation}</div>
                    </div>
                `;
            }

            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
                window.scrollTo(0, 0);
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
                window.scrollTo(0, 0);
            }
        }

        function updateProgress() {
            const percentage = Math.round(((currentQuestion + 1) / questions.length) * 100);
            document.getElementById('progressText').textContent = `Pergunta ${currentQuestion + 1} de ${questions.length}`;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function showResults() {
            const quizContent = document.getElementById('quizContent');
            const resultsContainer = document.getElementById('resultsContainer');

            quizContent.style.display = 'none';
            resultsContainer.classList.add('show');

            const percentage = Math.round((score / questions.length) * 100);
            const incorrect = questions.length - score;

            document.getElementById('percentageDisplay').textContent = percentage + '%';
            document.getElementById('correctCount').textContent = score;
            document.getElementById('incorrectCount').textContent = incorrect;

            let message = '';
            let messageClass = '';

            if (percentage >= 90) {
                message = '🌟 Excelente! Você é um expert em Termodinâmica e Efeito Estufa!';
                messageClass = 'excellent';
            } else if (percentage >= 75) {
                message = '👏 Muito bom! Você tem um ótimo conhecimento do assunto!';
                messageClass = 'good';
            } else if (percentage >= 60) {
                message = '📚 Bom trabalho! Estude um pouco mais os tópicos que errou.';
                messageClass = 'fair';
            } else {
                message = '💪 Continue estudando! Releia o guia e tente novamente.';
                messageClass = 'improve';
            }

            document.getElementById('messageFeedback').innerHTML = `<div class="message ${messageClass}">${message}</div>`;
            document.getElementById('progressText').textContent = 'Quiz Completado!';
            document.getElementById('progressFill').style.width = '100%';
        }

        // Iniciar quiz
        initQuiz();
    </script>
